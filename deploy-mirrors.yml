---
- name: Deploy Mirroring Infrastructure
  hosts: all
  vars_files:
    - vars.yaml

  tasks:
    - name: Create required directory structure
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      with_items:
        - "{{ stack_path }}/nginx/config"
        - "{{ stack_path }}/nginx/www/.assets"
        - "{{ stack_path }}/nginx/certs"
        - "{{ stack_path }}/nginx/secret"
        - "{{ stack_path }}/docker-registry"
        - "{{ stack_path }}/repo/jinja"
        - "{{ stack_path }}/repo/playbooks"
        - "{{ stack_path }}/repo/vars"

    - name: Create repo_control directories
      file:
        path: "{{ stack_path }}/repo/repo_control/{{ item.name }}"
        state: directory
        mode: '0755'
      loop: "{{ repos }}"

    - name: Create repo-specific www directories
      file:
        path: "{{ stack_path }}/nginx/www/{{ item.name }}"
        state: directory
        mode: '0755'
      loop: "{{ repos }}"

    - name: Deploy universal assets
      copy:
        src: files/
        dest: "{{ stack_path }}/nginx/www/.assets/"

    - name: Deploy nginx.conf
      template:
        src: jinja/nginx.conf.j2
        dest: "{{ stack_path }}/nginx/config/nginx.conf"
        mode: '0644'

    - name: Deploy GPG Key Generation Script
      template:
        src: jinja/generate-gpg.sh.j2
        dest: "{{ stack_path }}/nginx/config/generate-gpg.sh"
        mode: '0755'

    - name: Deploy Signing Scripts
      template:
        src: jinja/sign-repo.sh.j2
        dest: "{{ stack_path }}/repo/repo_control/{{ item.name }}/sign-{{ item.name }}.sh"
        mode: '0755'
      loop: "{{ repos }}"

    - name: Deploy Syncing Scripts
      template:
        src: jinja/sync-repo.sh.j2
        dest: "{{ stack_path }}/repo/repo_control/{{ item.name }}/sync-{{ item.name }}.sh"
        mode: '0755'
      loop: "{{ repos }}"

    - name: Deploy Rollback Scripts
      template:
        src: jinja/rollback-repo.sh.j2
        dest: "{{ stack_path }}/repo/repo_control/{{ item.name }}/rollback-{{ item.name }}.sh"
        mode: '0755'
      loop: "{{ repos }}"

    - name: Deploy HTML Landing Pages
      template:
        src: jinja/index.html.j2
        dest: "{{ stack_path }}/nginx/www/{{ item.name }}/index.html"
        mode: '0644'
      loop: "{{ repos }}"

    - name: Deploy docker-compose.yml
      template:
        src: jinja/docker-compose.yml.j2
        dest: "{{ stack_path }}/nginx/docker-compose.yml"
        mode: '0644'

    - name: Save Jinja Templates Artifacts
      copy:
        src: jinja/
        dest: "{{ stack_path }}/repo/jinja/"
        mode: '0644'

    - name: Save Playbooks Artifacts
      copy:
        src: deploy-mirrors.yml
        dest: "{{ stack_path }}/repo/playbooks/deploy-mirrors.yml"
        mode: '0644'

    - name: Save Variables Artifacts
      copy:
        src: vars.yaml
        dest: "{{ stack_path }}/repo/vars/vars.yaml"
        mode: '0644'

    - name: Deploy systemd service
      template:
        src: jinja/docker-compose-app.service.j2
        dest: /etc/systemd/system/nginx-repo-mirror.service
        mode: '0644'
      become: true

    - name: Enable and start systemd service
      systemd:
        name: nginx-repo-mirror
        enabled: yes
        state: started
        daemon_reload: yes
      become: true
