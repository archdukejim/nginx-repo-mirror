# ================================
#  NGINX GLOBAL SETTINGS (variables)
# ================================
worker_processes  ${NGINX_WORKER_PROCESSES:-auto};

events {
    worker_connections  ${NGINX_WORKER_CONNECTIONS:-8192};
    multi_accept        ${NGINX_MULTI_ACCEPT:-on};
}

http {
    sendfile            ${NGINX_SENDFILE:-on};
    tcp_nopush          ${NGINX_TCP_NOPUSH:-on};
    tcp_nodelay         ${NGINX_TCP_NODELAY:-on};
    keepalive_timeout   ${NGINX_KEEPALIVE_TIMEOUT:-65};

    include             ${NGINX_MIME_TYPES:-/etc/nginx/mime.types};
    default_type        ${NGINX_DEFAULT_TYPE:-application/octet-stream};

    ssl_protocols       ${NGINX_SSL_PROTOCOLS:-TLSv1.2 TLSv1.3};
    ssl_ciphers         ${NGINX_SSL_CIPHERS:-HIGH:!aNULL:!MD5};
    ssl_prefer_server_ciphers ${NGINX_SSL_PREFER_SERVER_CIPHERS:-on};

    # -------------------------------------------------
    # Landing Page: ${LANDING_HOST:-repo.jolt.internal}
    # -------------------------------------------------
    server {
        listen       80;
        listen       [::]:80;
        listen       443 ssl;
        listen       [::]:443 ssl;
        http2        on;

        server_name  ${LANDING_HOST:-repo.jolt.internal};

        # CRITICAL: certificates must match files in ${NGINX_CERT_DIR:-/etc/nginx/certs}
        ssl_certificate     ${NGINX_CERT_DIR:-/etc/nginx/certs}/${LANDING_CERT_BASENAME:-repo-jolt-internal}.crt;
        ssl_certificate_key ${NGINX_CERT_DIR:-/etc/nginx/certs}/${LANDING_CERT_BASENAME:-repo-jolt-internal}.key;

        root ${NGINX_LANDING_ROOT:-/usr/share/nginx/html};

        location / {
            index  index.html;
            limit_except GET HEAD { deny all; }
        }

        location /.assets/ {
            access_log off;
            expires 30d;
        }
    }

    # -------------------------------------------------
    # Ubuntu Mirror: ${MIRROR_PATTERN:-*.repo.jolt.internal}
    # -------------------------------------------------
    server {
        listen       80;
        listen       [::]:80;
        listen       443 ssl;
        listen       [::]:443 ssl;
        http2        on;

        server_name  ${MIRROR_PATTERN:-*.repo.jolt.internal};

        ssl_certificate     ${NGINX_CERT_DIR:-/etc/nginx/certs}/${MIRROR_CERT_BASENAME:-wildcard-repo-jolt-internal}.crt;
        ssl_certificate_key ${NGINX_CERT_DIR:-/etc/nginx/certs}/${MIRROR_CERT_BASENAME:-wildcard-repo-jolt-internal}.key;

        # Maps to your /mnt/ubuntu-repo volume (or any other location)
        root ${NGINX_MIRROR_ROOT:-/usr/share/nginx/ubuntu-repo};

        location / {
            autoindex          on;
            autoindex_format   html;
            autoindex_exact_size off;
            add_header Cache-Control "public, max-age=60";
        }

        # Prevent caching of signature files
        location ~* \.(gpg|asc|inrelease)$ {
            add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        }
    }
}

# Global workers
NGINX_WORKER_PROCESSES=auto
NGINX_WORKER_CONNECTIONS=8192
NGINX_MULTI_ACCEPT=on

# HTTP tuning
NGINX_SENDFILE=on
NGINX_TCP_NOPUSH=on
NGINX_TCP_NODELAY=on
NGINX_KEEPALIVE_TIMEOUT=65

# MIME & default type
NGINX_MIME_TYPES=/etc/nginx/mime.types
NGINX_DEFAULT_TYPE=application/octet-stream

# TLS settings
NGINX_SSL_PROTOCOLS="TLSv1.2 TLSv1.3"
NGINX_SSL_CIPHERS="HIGH:!aNULL:!MD5"
NGINX_SSL_PREFER_SERVER_CIPHERS=on

# Paths
NGINX_CERT_DIR=/etc/nginx/certs
NGINX_LANDING_ROOT=/usr/share/nginx/html
NGINX_MIRROR_ROOT=/usr/share/nginx/ubuntu-repo

# Hostnames
LANDING_HOST=repo.jolt.internal
MIRROR_PATTERN=*.repo.jolt.internal

# Certificate base names (without extension)
LANDING_CERT_BASENAME=repo-jolt-internal
MIRROR_CERT_BASENAME=wildcard-repo-jolt-internal