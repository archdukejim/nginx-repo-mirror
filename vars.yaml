kit_name: example_kit
domain: example.internal
cert_path: /opt/nginx/certs
stack_path: /opt
nginx_image: nginx:latest

repos:
  - name: ubuntu
    fqdn: ubuntu.repo.{{ domain }}
    target:
    - uri: <target_ip_or_hostname>
    - host_path: /mnt/ubuntu
    source:
    - uri: ubuntu.archive.ubuntu.com
    - path: ubuntu
  - name: clamav
    fqdn: clamav.repo.{{ domain }}
    target:
    - uri: <target_ip_or_hostname>
    - host_path: /mnt/clamav
    source:
    - uri: <clamav_source_repo_url>
    - path: <clamav_source_repo_path>
  - name: selected_debs
    fqdn: debs.repo.{{ domain }}
    target:
    - uri: <target_ip_or_hostname>
    - host_path: /mnt/ubuntu/selected_debs
    source:
    - uri: <debs_source_repo_url>
    - path: <debs_source_repo_path>