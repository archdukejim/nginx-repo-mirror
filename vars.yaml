domain: example.internal
cert_path: /opt/nginx/certs
stack_path: /opt
nginx_image: nginx:latest

Organization: Corporation 1
Vendor: Corporation 2
last_update: "2026-04-29"

repos:
  - name: ubuntu
    fqdn: ubuntu-mirror.{{ domain }}
    distro: noble
    components: main restricted universe multiverse
    host_path: /mnt/ubuntu
  - name: clamav
    fqdn: clamav-signatures.{{ domain }}
    path: <clamav_source_repo_path>
  - name: Extra Debian Packages
    fqdn: extra-packages.{{ domain }}
    distro: 2026.04
    components: main
    path: <debs_source_repo_path>